databaseChangeLog:
  - changeSet:
      id: 004-create-webhook-delivery-log
      author: gateway-team
      changes:
        - createTable:
            schemaName: notification
            tableName: webhook_delivery_log
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: webhook_endpoint_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(255)
              - column:
                  name: status_code
                  type: INT
              - column:
                  name: success
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: TEXT
              - column:
                  name: attempt_number
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: delivered_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - createIndex:
            schemaName: notification
            tableName: webhook_delivery_log
            indexName: idx_webhook_delivery_log_endpoint_id
            columns:
              - column:
                  name: webhook_endpoint_id
