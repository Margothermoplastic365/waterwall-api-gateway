<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Verify your email</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h2 style="color: #333;">Verify your email address</h2>
    <p>Hi <span th:text="${name}">User</span>,</p>
    <p>Please click the link below to verify your email address:</p>
    <p>
        <a th:href="${verificationUrl}"
           style="display: inline-block; padding: 12px 24px; background-color: #4CAF50; color: white;
                  text-decoration: none; border-radius: 4px;">
            Verify Email
        </a>
    </p>
    <p>If the button above does not work, copy and paste this URL into your browser:</p>
    <p th:text="${verificationUrl}">https://example.com/verify</p>
    <p style="color: #666; font-size: 12px;">If you did not create an account, please ignore this email.</p>
</body>
</html>
