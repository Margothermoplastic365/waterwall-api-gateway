<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="860" height="420" fill="#f8fafc"/>

  <text x="430" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">
    RequestLogStore — Strategy Pattern with Spring Profiles
  </text>
  <text x="430" y="58" text-anchor="middle" font-size="13" fill="#64748b">
    analytics-service swaps its storage backend at startup based on the active Spring profile
  </text>

  <g filter="url(#shadow)">
    <rect x="310" y="90" width="240" height="80" rx="10" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
    <text x="430" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#4338ca">
      RequestLogStore
    </text>
    <text x="430" y="140" text-anchor="middle" font-size="12" fill="#64748b">
      interface
    </text>
    <text x="430" y="158" text-anchor="middle" font-size="11" fill="#64748b" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
      save(), query(), aggregate()
    </text>
  </g>

  <line x1="360" y1="170" x2="200" y2="230" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="170" x2="660" y2="230" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="250" y="205" text-anchor="middle" font-size="11" font-style="italic" fill="#64748b">implements</text>
  <text x="610" y="205" text-anchor="middle" font-size="11" font-style="italic" fill="#64748b">implements</text>

  <g filter="url(#shadow)">
    <rect x="40" y="235" width="320" height="140" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <rect x="40" y="235" width="320" height="30" rx="10" fill="#10b981"/>
    <rect x="40" y="255" width="320" height="10" fill="#10b981"/>
    <text x="200" y="255" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
      @Profile("!clickhouse")  — default
    </text>
    <text x="200" y="295" text-anchor="middle" font-size="15" font-weight="700" fill="#064e3b">
      PostgresRequestLogStore
    </text>
    <text x="200" y="320" text-anchor="middle" font-size="12" fill="#475569">
      Writes request logs to PostgreSQL
    </text>
    <text x="200" y="340" text-anchor="middle" font-size="12" fill="#475569">
      Same database as the rest of the platform
    </text>
    <text x="200" y="360" text-anchor="middle" font-size="11" fill="#64748b">
      ~5K–10K inserts/sec · good for most deployments
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="235" width="320" height="140" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <rect x="500" y="235" width="320" height="30" rx="10" fill="#f59e0b"/>
    <rect x="500" y="255" width="320" height="10" fill="#f59e0b"/>
    <text x="660" y="255" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
      @Profile("clickhouse")  — opt-in
    </text>
    <text x="660" y="295" text-anchor="middle" font-size="15" font-weight="700" fill="#78350f">
      ClickHouseRequestLogStore
    </text>
    <text x="660" y="320" text-anchor="middle" font-size="12" fill="#475569">
      Writes request logs to ClickHouse via JDBC
    </text>
    <text x="660" y="340" text-anchor="middle" font-size="12" fill="#475569">
      Columnar storage, TTL auto-expiry
    </text>
    <text x="660" y="360" text-anchor="middle" font-size="11" fill="#64748b">
      500K+ inserts/sec · billions of rows
    </text>
  </g>

  <text x="430" y="402" text-anchor="middle" font-size="11" fill="#94a3b8">
    All other services are unaffected — they always use PostgreSQL.
  </text>
</svg>
