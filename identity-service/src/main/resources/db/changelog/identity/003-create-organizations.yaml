databaseChangeLog:
  - changeSet:
      id: 003-create-organizations
      author: gateway-team
      changes:
        - createTable:
            schemaName: identity
            tableName: organizations
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: slug
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: text
              - column:
                  name: domain
                  type: varchar(255)
              - column:
                  name: logo_url
                  type: varchar(512)
              - column:
                  name: status
                  type: varchar(30)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: billing_contact_email
                  type: varchar(255)
              - column:
                  name: technical_contact_email
                  type: varchar(255)
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
      rollback:
        - dropTable:
            schemaName: identity
            tableName: organizations
