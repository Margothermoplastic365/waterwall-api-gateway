databaseChangeLog:
  - changeSet:
      id: seed-003-super-admin
      author: gateway-team
      context: dev,uat
      comment: "Default SUPER_ADMIN user for development. Password: changeme (Argon2 hash)"
      changes:
        - sql:
            sql: |
              -- Insert default admin user (password: changeme)
              -- Argon2 hash generated by Spring's Argon2PasswordEncoder
              INSERT INTO identity.users (id, email, password_hash, status, email_verified, password_changed_at)
              VALUES (
                '00000000-0000-0000-0000-000000000099',
                'admin@gateway.local',
                '{argon2id}$argon2id$v=19$m=16384,t=2,p=1$Y2hhbmdlbWVzYWx0$kR8RQwSB3J5FhGvHkGPYMg',
                'ACTIVE',
                true,
                now()
              ) ON CONFLICT (email) DO NOTHING;

              -- Create admin profile
              INSERT INTO identity.user_profiles (id, user_id, display_name)
              VALUES (
                gen_random_uuid(),
                '00000000-0000-0000-0000-000000000099',
                'Platform Admin'
              ) ON CONFLICT (user_id) DO NOTHING;

              -- Assign SUPER_ADMIN role
              INSERT INTO identity.role_assignments (id, user_id, role_id, scope_type, assigned_at)
              VALUES (
                gen_random_uuid(),
                '00000000-0000-0000-0000-000000000099',
                '00000000-0000-0000-0000-000000000001',
                'GLOBAL',
                now()
              ) ON CONFLICT DO NOTHING;
      rollback:
        - sql:
            sql: |
              DELETE FROM identity.role_assignments WHERE user_id = '00000000-0000-0000-0000-000000000099';
              DELETE FROM identity.user_profiles WHERE user_id = '00000000-0000-0000-0000-000000000099';
              DELETE FROM identity.users WHERE id = '00000000-0000-0000-0000-000000000099';
