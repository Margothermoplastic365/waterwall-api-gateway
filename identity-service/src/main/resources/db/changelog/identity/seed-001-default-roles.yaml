            schemaName: identity
            tableName: roles
            columns:
              - column: { name: id, value: "00000000-0000-0000-0000-000000000010" }
              - column: { name: name, value: VIEWER }
              - column: { name: description, value: "Read-only portal access, browse docs" }
              - column: { name: scope_type, value: GLOBAL }
              - column: { name: is_system, valueBoolean: true }
      rollback:
        - delete:
            schemaName: identity
            tableName: roles
            where: is_system = true
