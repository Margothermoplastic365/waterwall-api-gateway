databaseChangeLog:
  - changeSet:
      id: 002-create-user-profiles
      author: gateway-team
      changes:
        - createTable:
            schemaName: identity
            tableName: user_profiles
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_profile_user
                    references: identity.users(id)
                    deleteCascade: true
              - column:
                  name: display_name
                  type: varchar(255)
              - column:
                  name: phone
                  type: varchar(50)
              - column:
                  name: phone_verified
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: avatar_url
                  type: varchar(512)
              - column:
                  name: bio
                  type: text
              - column:
                  name: timezone
                  type: varchar(50)
                  defaultValue: UTC
              - column:
                  name: language
                  type: varchar(10)
                  defaultValue: en
              - column:
                  name: job_title
                  type: varchar(255)
              - column:
                  name: department
                  type: varchar(255)
      rollback:
        - dropTable:
            schemaName: identity
            tableName: user_profiles
