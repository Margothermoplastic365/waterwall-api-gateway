      rollback:
        - sql:
            sql: |
              DELETE FROM identity.api_keys WHERE application_id IN (SELECT id FROM identity.applications WHERE id LIKE '30000000%');
              DELETE FROM identity.applications WHERE id LIKE '30000000%';
              DELETE FROM identity.role_assignments WHERE user_id LIKE '20000000%';
              DELETE FROM identity.org_members WHERE user_id LIKE '20000000%';
              DELETE FROM identity.user_profiles WHERE user_id LIKE '20000000%';
              DELETE FROM identity.users WHERE id LIKE '20000000%';
              DELETE FROM identity.organizations WHERE id LIKE '10000000%';
