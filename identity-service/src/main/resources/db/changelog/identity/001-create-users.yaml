databaseChangeLog:
  - changeSet:
      id: 001-create-users
      author: gateway-team
      changes:
        - createTable:
            schemaName: identity
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(30)
                  defaultValue: PENDING_VERIFICATION
                  constraints:
                    nullable: false
              - column:
                  name: email_verified
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: email_verify_token
                  type: varchar(255)
              - column:
                  name: email_verify_expires_at
                  type: timestamptz
              - column:
                  name: password_changed_at
                  type: timestamptz
              - column:
                  name: last_login_at
                  type: timestamptz
              - column:
                  name: failed_login_count
                  type: int
                  defaultValueNumeric: 0
              - column:
                  name: locked_until
                  type: timestamptz
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - createIndex:
            schemaName: identity
            tableName: users
            indexName: idx_users_email
            columns:
              - column:
                  name: email
        - createIndex:
            schemaName: identity
            tableName: users
            indexName: idx_users_status
            columns:
              - column:
                  name: status
      rollback:
        - dropTable:
            schemaName: identity
            tableName: users
