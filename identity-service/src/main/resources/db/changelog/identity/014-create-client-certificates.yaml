databaseChangeLog:
  - changeSet:
      id: 014-create-client-certificates
      author: gateway-team
      changes:
        - createTable:
            schemaName: identity
            tableName: client_certificates
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: application_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: subject_cn
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: fingerprint
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: issuer
                  type: varchar(500)
              - column:
                  name: expires_at
                  type: timestamptz
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
        - addForeignKeyConstraint:
            baseTableSchemaName: identity
            baseTableName: client_certificates
            baseColumnNames: application_id
            referencedTableSchemaName: identity
            referencedTableName: applications
            referencedColumnNames: id
            constraintName: fk_clientcert_app
        - createIndex:
            schemaName: identity
            tableName: client_certificates
            indexName: idx_clientcert_fingerprint
            columns:
              - column:
                  name: fingerprint
        - createIndex:
            schemaName: identity
            tableName: client_certificates
            indexName: idx_clientcert_app
            columns:
              - column:
                  name: application_id
      rollback:
        - dropTable:
            schemaName: identity
            tableName: client_certificates
