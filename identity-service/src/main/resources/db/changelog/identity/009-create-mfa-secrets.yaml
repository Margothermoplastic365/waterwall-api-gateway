databaseChangeLog:
  - changeSet:
      id: 009-create-mfa-secrets
      author: gateway-team
      changes:
        - createTable:
            schemaName: identity
            tableName: mfa_secrets
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_mfa_user
                    references: identity.users(id)
                    deleteCascade: true
              - column:
                  name: type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: secret_encrypted
                  type: varchar(512)
              - column:
                  name: enabled
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: recovery_codes
                  type: jsonb
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
        - addUniqueConstraint:
            schemaName: identity
            tableName: mfa_secrets
            columnNames: user_id, type
            constraintName: uq_mfa_user_type
      rollback:
        - dropTable:
            schemaName: identity
            tableName: mfa_secrets
