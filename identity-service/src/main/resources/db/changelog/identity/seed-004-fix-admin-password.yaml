databaseChangeLog:
  - changeSet:
      id: seed-004-fix-admin-password
      author: gateway-team
      context: dev,uat
      comment: "Fix admin password hash — original Argon2 hash had incorrect parameters"
      changes:
        - sql:
            sql: |
              UPDATE identity.users
              SET password_hash = '{bcrypt}$2b$12$hLiqgXFC18IIY4Du3DqrSOUcY.AjwBb1IJxFiBgwT5.2EIcIpjqwq'
              WHERE email = 'admin@gateway.local';
