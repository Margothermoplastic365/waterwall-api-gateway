databaseChangeLog:
  - changeSet:
      id: gw-028-create-compliance-reports
      author: gateway-team
      changes:
        - createTable:
            schemaName: gateway
            tableName: compliance_reports
            columns:
              - column: { name: id, type: uuid, defaultValueComputed: gen_random_uuid(), constraints: { primaryKey: true } }
              - column: { name: type, type: varchar(50), constraints: { nullable: false } }
              - column: { name: status, type: varchar(30), constraints: { nullable: false } }
              - column: { name: score, type: int }
              - column: { name: findings, type: jsonb }
              - column: { name: generated_at, type: timestamptz, defaultValueComputed: now() }

  - changeSet:
      id: gw-028-create-data-classifications
      author: gateway-team
      changes:
        - createTable:
            schemaName: gateway
            tableName: data_classifications
            columns:
              - column: { name: id, type: uuid, defaultValueComputed: gen_random_uuid(), constraints: { primaryKey: true } }
              - column: { name: api_id, type: uuid, constraints: { nullable: false, foreignKeyName: fk_data_class_api, references: gateway.apis(id) } }
              - column: { name: classification, type: varchar(50), constraints: { nullable: false } }
              - column: { name: pii_fields, type: jsonb }
              - column: { name: handling_policy, type: jsonb }

  - changeSet:
      id: gw-028-create-consent-records
      author: gateway-team
      changes:
        - createTable:
            schemaName: gateway
            tableName: consent_records
            columns:
              - column: { name: id, type: uuid, defaultValueComputed: gen_random_uuid(), constraints: { primaryKey: true } }
              - column: { name: user_id, type: uuid, constraints: { nullable: false } }
              - column: { name: purpose, type: varchar(255), constraints: { nullable: false } }
              - column: { name: granted, type: boolean, defaultValueBoolean: false }
              - column: { name: granted_at, type: timestamptz }
              - column: { name: revoked_at, type: timestamptz }
