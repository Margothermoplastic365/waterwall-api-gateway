databaseChangeLog:
  - changeSet:
      id: gw-010-create-migrations
      author: gateway-team
      changes:
        - createTable:
            schemaName: gateway
            tableName: migrations
            columns:
              - column: { name: id, type: uuid, defaultValueComputed: gen_random_uuid(), constraints: { primaryKey: true } }
              - column: { name: api_id, type: uuid, constraints: { nullable: false, foreignKeyName: fk_migration_api, references: gateway.apis(id) } }
              - column: { name: source_env, type: varchar(50), constraints: { nullable: false } }
              - column: { name: target_env, type: varchar(50), constraints: { nullable: false } }
              - column: { name: status, type: varchar(30), constraints: { nullable: false } }
              - column: { name: migration_package, type: jsonb }
              - column: { name: initiated_by, type: uuid }
              - column: { name: initiated_at, type: timestamptz, defaultValueComputed: now() }
              - column: { name: completed_at, type: timestamptz }
        - createIndex: { schemaName: gateway, tableName: migrations, indexName: idx_migration_api, columns: [{ column: { name: api_id } }] }
      rollback:
        - dropTable: { schemaName: gateway, tableName: migrations }
