databaseChangeLog:
  - changeSet:
      id: gw-021-create-ai-token-usage
      author: gateway-team
      changes:
        - createTable:
            schemaName: gateway
            tableName: ai_token_usage
            columns:
              - column: { name: id, type: bigserial, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: consumer_id, type: uuid, constraints: { nullable: false } }
              - column: { name: model, type: varchar(100) }
              - column: { name: provider, type: varchar(50) }
              - column: { name: prompt_tokens, type: int, constraints: { nullable: false } }
              - column: { name: completion_tokens, type: int, constraints: { nullable: false } }
              - column: { name: total_tokens, type: int, constraints: { nullable: false } }
              - column: { name: estimated_cost_usd, type: "decimal(12,6)" }
              - column: { name: created_at, type: timestamptz, defaultValueComputed: now() }
        - createIndex:
            schemaName: gateway
            tableName: ai_token_usage
            indexName: idx_ai_token_usage_consumer_created
            columns:
              - column: { name: consumer_id }
              - column: { name: created_at }

  - changeSet:
      id: gw-021-create-ai-token-budgets
      author: gateway-team
      changes:
        - createTable:
            schemaName: gateway
            tableName: ai_token_budgets
            columns:
              - column: { name: id, type: uuid, defaultValueComputed: gen_random_uuid(), constraints: { primaryKey: true } }
              - column: { name: consumer_id, type: uuid, constraints: { nullable: false, unique: true } }
              - column: { name: daily_limit, type: bigint }
              - column: { name: weekly_limit, type: bigint }
              - column: { name: monthly_limit, type: bigint }
              - column: { name: enforcement, type: varchar(20), defaultValue: "SOFT" }
