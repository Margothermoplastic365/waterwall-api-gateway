server:
  port: 8082

spring:
  application:
    name: management-api
  threads:
    virtual:
      enabled: true
  profiles:
    active: ${GATEWAY_ENV:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gateway}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 60000
      schema: gateway

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: gateway
        format_sql: false
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/gateway/master.yaml
    default-schema: gateway

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/cem}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${IDENTITY_SERVICE_URL:http://localhost:8081}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: false

paystack:
  secret-key: ${PAYSTACK_SECRET_KEY:}
  public-key: ${PAYSTACK_PUBLIC_KEY:}
  base-url: https://api.paystack.co
  callback-url: ${PAYSTACK_CALLBACK_URL:http://localhost:3000/billing?verify=true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
