# Countries GraphQL API — LIVE at https://countries.trevorblades.com/graphql
#
# Test with:
#   curl -X POST https://countries.trevorblades.com/graphql \
#     -H "Content-Type: application/json" \
#     -d '{"query":"{ countries { name code capital currency } }"}'

type Query {
  countries(filter: CountryFilterInput): [Country!]!
  country(code: ID!): Country
  continents(filter: ContinentFilterInput): [Continent!]!
  continent(code: ID!): Continent
  languages(filter: LanguageFilterInput): [Language!]!
  language(code: ID!): Language
}

type Country {
  code: ID!
  name: String!
  native: String!
  phone: String!
  capital: String
  currency: String
  emoji: String!
  emojiU: String!
  continent: Continent!
  languages: [Language!]!
  states: [State!]!
  subdivisions: [Subdivision!]!
  awsRegion: String!
}

type Continent {
  code: ID!
  name: String!
  countries: [Country!]!
}

type Language {
  code: ID!
  name: String!
  native: String!
  rtl: Boolean!
}

type State {
  code: String
  name: String!
  country: Country!
}

type Subdivision {
  code: ID!
  name: String!
  emoji: String
}

input CountryFilterInput {
  code: StringQueryOperatorInput
  currency: StringQueryOperatorInput
  continent: StringQueryOperatorInput
}

input ContinentFilterInput {
  code: StringQueryOperatorInput
}

input LanguageFilterInput {
  code: StringQueryOperatorInput
}

input StringQueryOperatorInput {
  eq: String
  ne: String
  in: [String!]
  nin: [String!]
  regex: String
  glob: String
}
