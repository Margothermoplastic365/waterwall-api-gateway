apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apipolicies.gateway.io
spec:
  group: gateway.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum:
                    - RATE_LIMIT
                    - AUTH
                    - TRANSFORM
                    - CORS
                    - IP_FILTER
                    - HEADER_INJECT
                    - CIRCUIT_BREAKER
                    - RETRY
                    - CACHE
                    - CUSTOM
                config:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                targetApis:
                  type: array
                  items:
                    type: string
                enabled:
                  type: boolean
                  default: true
                priority:
                  type: integer
                  default: 100
            status:
              type: object
              properties:
                phase:
                  type: string
                appliedTo:
                  type: integer
                message:
                  type: string
                lastReconciled:
                  type: string
                  format: date-time
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Enabled
          type: boolean
          jsonPath: .spec.enabled
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: apipolicies
    singular: apipolicy
    kind: ApiPolicy
    shortNames:
      - apipol
