apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apidefinitions.gateway.io
spec:
  group: gateway.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                version:
                  type: string
                upstream:
                  type: string
                authTypes:
                  type: array
                  items:
                    type: string
                rateLimits:
                  type: object
                  properties:
                    requestsPerSecond:
                      type: integer
                    requestsPerMinute:
                      type: integer
                    requestsPerDay:
                      type: integer
                    burstAllowance:
                      type: integer
                description:
                  type: string
                protocol:
                  type: string
                  enum:
                    - REST
                    - GRAPHQL
                    - GRPC
                    - SOAP
                    - WEBSOCKET
                tags:
                  type: array
                  items:
                    type: string
                category:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
                lastReconciled:
                  type: string
                  format: date-time
      additionalPrinterColumns:
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Upstream
          type: string
          jsonPath: .spec.upstream
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: apidefinitions
    singular: apidefinition
    kind: ApiDefinition
    shortNames:
      - apidef
