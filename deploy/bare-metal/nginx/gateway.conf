upstream gateway_runtime {
    server 127.0.0.1:8080;
    # Add more for horizontal scaling:
    # server 127.0.0.1:8085;
    # server 127.0.0.1:8086;
}

server {
    listen 80;
    server_name gateway.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gateway.example.com;

    # SSL - update paths to your certificates
    ssl_certificate     /etc/ssl/gateway/fullchain.pem;
    ssl_certificate_key /etc/ssl/gateway/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 10m;

    # API traffic -> gateway-runtime
    location /api/ {
        proxy_pass http://gateway_runtime/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # gRPC traffic -> gateway-runtime Netty port
    location /grpc/ {
        grpc_pass grpc://127.0.0.1:9090;
    }

    # OAuth2/OIDC -> identity-service
    location /oauth2/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /.well-known/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
    }

    # Management API (restrict to internal network)
    location /manage/ {
        proxy_pass http://127.0.0.1:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Uncomment to restrict access:
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # deny all;
    }

    # Admin Dashboard (internal network only)
    location /admin/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Uncomment to restrict access:
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # deny all;
    }

    # WebSocket upgrade support
    location /ws/ {
        proxy_pass http://gateway_runtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Developer Portal (default - public facing)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
