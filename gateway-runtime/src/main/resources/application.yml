server:
  port: ${GATEWAY_HTTP_PORT:8080}
  tomcat:
    accept-count: ${GATEWAY_ACCEPT_COUNT:10000}
    max-connections: ${GATEWAY_MAX_CONNECTIONS:50000}
    threads:
      max: ${GATEWAY_THREADS_MAX:500}
      min-spare: ${GATEWAY_THREADS_MIN:100}
    connection-timeout: ${GATEWAY_CONNECTION_TIMEOUT:2000}
    keep-alive-timeout: ${GATEWAY_KEEP_ALIVE_TIMEOUT:60000}
    max-keep-alive-requests: ${GATEWAY_MAX_KEEP_ALIVE_REQUESTS:10000}

spring:
  application:
    name: gateway-runtime
  threads:
    virtual:
      enabled: true
  profiles:
    active: ${GATEWAY_ENV:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gateway}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:100}
      minimum-idle: 20
      idle-timeout: 120000
      max-lifetime: 1800000
      connection-timeout: 5000
      leak-detection-threshold: 30000
      schema: gateway

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: gateway
        format_sql: false
    open-in-view: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/cem}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${IDENTITY_SERVICE_URL:http://localhost:8081}

  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

# =============================================================
# Gateway Runtime Configuration — ALL values are configurable
# via environment variables for both Docker and bare metal
# =============================================================
gateway:
  runtime:
    # ── Service URLs ──
    identity-service-url: ${IDENTITY_SERVICE_URL:http://localhost:8081}

    # ── gRPC (Phase 2) ──
    grpc-port: ${GRPC_PORT:9090}

    # ── Proxy settings ──
    proxy:
      connect-timeout-ms: ${PROXY_CONNECT_TIMEOUT:10000}
      read-timeout-ms: ${PROXY_READ_TIMEOUT:60000}
      max-connections: ${PROXY_MAX_CONNECTIONS:200}
      max-request-body-size-bytes: ${PROXY_MAX_BODY_SIZE:10485760}  # 10MB

    # ── Load balancing & circuit breaker ──
    lb:
      algorithm: ${LB_ALGORITHM:round-robin}
      health-check-interval-ms: ${LB_HEALTH_CHECK_INTERVAL:30000}
      circuit-breaker:
        failure-threshold: ${LB_CB_FAILURE_THRESHOLD:5}
        reset-timeout-seconds: ${LB_CB_RESET_TIMEOUT:60}
      retry:
        max-retries: ${LB_RETRY_MAX:2}
        backoff-ms: ${LB_RETRY_BACKOFF:100}

    # ── Rate limiting ──
    rate-limit:
      sync-enabled: ${RATELIMIT_SYNC_ENABLED:true}
      default-requests-per-second: ${RATELIMIT_DEFAULT_RPS:100}
      default-requests-per-minute: ${RATELIMIT_DEFAULT_RPM:1000}
      default-requests-per-day: ${RATELIMIT_DEFAULT_RPD:100000}
      default-burst-allowance: ${RATELIMIT_DEFAULT_BURST:10}
      strict-window-seconds: ${RATELIMIT_STRICT_WINDOW:60}

    # ── Revocation list (Tier 2 cache) ──
    revocation-list:
      cache-ttl-seconds: ${REVOCATION_CACHE_TTL:5}

    # ── Security headers & IP filtering ──
    security:
      headers:
        hsts-max-age: ${SECURITY_HSTS_MAX_AGE:31536000}
        frame-options: ${SECURITY_FRAME_OPTIONS:DENY}
        content-security-policy: ${SECURITY_CSP:default-src 'self'}
        referrer-policy: ${SECURITY_REFERRER:strict-origin-when-cross-origin}
        permissions-policy: ${SECURITY_PERMISSIONS_POLICY:}
      ip-whitelist: ${SECURITY_IP_WHITELIST:}
      ip-blacklist: ${SECURITY_IP_BLACKLIST:}
      trust-x-forwarded-for: ${SECURITY_TRUST_XFF:true}

    # ── Auth settings ──
    auth:
      api-key-header: ${AUTH_APIKEY_HEADER:X-API-Key}
      api-key-query-param: ${AUTH_APIKEY_PARAM:apikey}
      api-key-cache-ttl-minutes: ${AUTH_APIKEY_CACHE_TTL:5}
      jwt-cache-ttl-minutes: ${AUTH_JWT_CACHE_TTL:60}
      allow-anonymous-health: ${AUTH_ALLOW_ANON_HEALTH:true}

    # ── Access logging ──
    access-log:
      enabled: ${ACCESS_LOG_ENABLED:true}
      include-headers: ${ACCESS_LOG_HEADERS:false}
      include-body: ${ACCESS_LOG_BODY:false}
      max-body-log-size: ${ACCESS_LOG_MAX_BODY:1024}

    # ── CORS ──
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
      allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS,HEAD}
      allowed-headers: ${CORS_ALLOWED_HEADERS:*}
      allow-credentials: ${CORS_ALLOW_CREDENTIALS:false}
      max-age-seconds: ${CORS_MAX_AGE:3600}

    # ── Route matching ──
    routing:
      reload-on-startup: ${ROUTING_RELOAD_ON_STARTUP:true}
      cache-enabled: ${ROUTING_CACHE_ENABLED:true}

    # ── Protocol support (Phase 2+) ──
    protocols:
      llm-enabled: ${PROTOCOL_LLM:true}
      rest-enabled: ${PROTOCOL_REST:true}
      soap-enabled: ${PROTOCOL_SOAP:false}
      graphql-enabled: ${PROTOCOL_GRAPHQL:false}
      grpc-enabled: ${PROTOCOL_GRPC:false}
      websocket-enabled: ${PROTOCOL_WEBSOCKET:false}
      sse-enabled: ${PROTOCOL_SSE:false}
      jsonrpc-enabled: ${PROTOCOL_JSONRPC:false}
      odata-enabled: ${PROTOCOL_ODATA:false}

  # ── AI/LLM Gateway Configuration ──
  ai:
    enabled: true
    default-provider: openai
    fallback-chain: openai,anthropic,deepseek
    safety:
      block-on-injection: true
      redact-pii: true
      block-on-toxicity: false
    cache:
      enabled: true
      similarity-threshold: 0.95
    providers:
      openai:
        api-url: https://api.openai.com/v1
        api-key: ${OPENAI_API_KEY:}
        default-model: gpt-4o
        enabled: true
      anthropic:
        api-url: https://api.anthropic.com/v1
        api-key: ${ANTHROPIC_API_KEY:}
        default-model: claude-sonnet-4-20250514
        enabled: false
      deepseek:
        api-url: https://api.deepseek.com/v1
        api-key: ${DEEPSEEK_API_KEY:}
        default-model: deepseek-chat
        enabled: false

  # ── Service Mesh Integration ──
  service-mesh:
    enabled: ${SERVICE_MESH_ENABLED:false}
    discovery-type: ${SERVICE_MESH_DISCOVERY_TYPE:static}  # static, docker, kubernetes
    k8s-namespace: ${SERVICE_MESH_K8S_NAMESPACE:default}
    default-port: ${SERVICE_MESH_DEFAULT_PORT:8080}
    cluster-domain: ${SERVICE_MESH_CLUSTER_DOMAIN:cluster.local}

  # ── Event Gateway ──
  events:
    enabled: true
    default-broker-url: ${EVENT_BROKER_URL:amqp://localhost:5672}
    max-message-size-bytes: 1048576
    dead-letter-exchange: gateway.dlx
